<!doctype html>
<html lang="zh-Hans">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>导出PCB资料</title>
		<style>
			:root {
				--bg: #f5f7fb;
				--panel: #ffffff;
				--text: #12263a;
				--sub: #5e6b7a;
				--line: #d7deea;
				--primary: #0066d9;
				--primary-hover: #0056b7;
				--ok: #137333;
				--err: #b3261e;
			}

			* {
				box-sizing: border-box;
				font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
			}

			body {
				margin: 0;
				padding: 20px;
				background: radial-gradient(circle at top right, #e7f0ff 0%, var(--bg) 45%);
				color: var(--text);
			}

			.panel {
				background: var(--panel);
				border: 1px solid var(--line);
				border-radius: 12px;
				padding: 16px;
				box-shadow: 0 8px 24px rgba(16, 35, 58, 0.06);
			}

			h1 {
				margin: 0 0 8px;
				font-size: 20px;
			}

			.desc {
				margin: 0 0 16px;
				color: var(--sub);
				font-size: 13px;
			}

			.grid {
				display: grid;
				grid-template-columns: 1fr;
				gap: 14px;
			}

			label {
				display: block;
				font-size: 13px;
				margin-bottom: 6px;
				color: var(--sub);
			}

			select,
			input[type="text"] {
				width: 100%;
				padding: 10px 12px;
				border: 1px solid var(--line);
				border-radius: 8px;
				font-size: 14px;
				background: #fff;
			}

			.settings-title {
				margin: 2px 0 8px;
				font-size: 16px;
				font-weight: 700;
			}

			.path-row {
				display: grid;
				grid-template-columns: auto 1fr;
				gap: 10px;
				align-items: center;
			}

			.path-label {
				color: var(--text);
				font-size: 14px;
				white-space: nowrap;
			}

			.path-note {
				margin-top: 6px;
				color: var(--sub);
				font-size: 12px;
			}

			.row {
				display: grid;
				grid-template-columns: 1fr auto auto;
				gap: 8px;
			}

			button {
				border: 1px solid var(--line);
				background: #fff;
				color: var(--text);
				border-radius: 8px;
				padding: 10px 14px;
				font-size: 13px;
				cursor: pointer;
			}

			button.primary {
				background: var(--primary);
				border-color: var(--primary);
				color: #fff;
				font-weight: 600;
			}

			button.primary:hover {
				background: var(--primary-hover);
			}

			button:disabled {
				cursor: not-allowed;
				opacity: 0.55;
			}

			.footer {
				display: flex;
				gap: 10px;
				margin-top: 14px;
				align-items: center;
				flex-wrap: wrap;
			}

			.message {
				font-size: 13px;
				color: var(--sub);
				margin-top: 10px;
				white-space: pre-wrap;
			}

			.message.error {
				color: var(--err);
			}

			.message.success {
				color: var(--ok);
			}

			.result {
				margin-top: 14px;
				border-top: 1px dashed var(--line);
				padding-top: 12px;
				font-size: 13px;
				white-space: pre-wrap;
			}

			@media (max-width: 740px) {
				.row {
					grid-template-columns: 1fr;
				}
			}
		</style>
	</head>
	<body>
		<div class="panel">
			<h1>导出PCB资料</h1>
			<p class="desc">填写保存路径时将按该路径批量导出；未填写时将改为系统“另存为”逐个保存。</p>

			<div class="grid">
				<div>
					<label for="templateSelect">BOM模板（已导入模板）</label>
					<div class="row">
						<select id="templateSelect"></select>
						<button id="refreshTemplatesBtn" type="button">刷新模板</button>
						<button id="saveTemplateBtn" type="button">保存模板记忆</button>
					</div>
				</div>
				<div>
					<div class="settings-title">客户端设置</div>
					<div class="path-row">
						<div class="path-label">保存路径:</div>
						<input id="outputDirInput" type="text" placeholder="如：C:\Users\Your\Documents" />
					</div>
					<div class="path-note">强烈建议填此项，避免保存弹窗过多</div>
				</div>
			</div>

			<div class="footer">
				<button id="exportBtn" class="primary" type="button">一键导出</button>
				<span id="statusMessage" class="message"></span>
			</div>

			<div id="result" class="result"></div>
		</div>

		<script>
			(() => {
				const STORAGE_TEMPLATE_KEY = 'export_pcb.default_template';
				const STORAGE_OUTPUT_DIR_KEY = 'export_pcb.output_dir';
				const STORAGE_OUTPUT_DIR_RAW_KEY = 'export_pcb.output_dir_raw';
				const PCB_DOCUMENT_TYPE = 3;

				const templateSelect = document.getElementById('templateSelect');
				const refreshTemplatesBtn = document.getElementById('refreshTemplatesBtn');
				const saveTemplateBtn = document.getElementById('saveTemplateBtn');
				const outputDirInput = document.getElementById('outputDirInput');
				const exportBtn = document.getElementById('exportBtn');
				const statusMessage = document.getElementById('statusMessage');
				const resultBox = document.getElementById('result');

				function getEdaApi() {
					if (window.eda) {
						return window.eda;
					}
					if (window.parent && window.parent.eda) {
						return window.parent.eda;
					}
					return undefined;
				}

				const edaApi = getEdaApi();

				function setStatus(message, mode) {
					statusMessage.textContent = message || '';
					statusMessage.className = mode ? `message ${mode}` : 'message';
				}

				function clearResult() {
					resultBox.textContent = '';
				}

				function appendResult(line) {
					resultBox.textContent += `${line}\n`;
				}

				function trimRightSeparators(path) {
					return path.replace(/[\\/]+$/, '');
				}

				function toFolderUri(path) {
					const trimmed = trimRightSeparators(path);
					const sep = /\\/.test(trimmed) ? '\\' : '/';
					return `${trimmed}${sep}`;
				}

				function toRawPath(pathOrUri) {
					if (typeof pathOrUri !== 'string' || !pathOrUri.trim()) {
						return undefined;
					}
					return trimRightSeparators(pathOrUri.trim());
				}

				function normalizeDirectoryInput(value) {
					if (typeof value !== 'string') {
						return undefined;
					}
					const cleaned = trimRightSeparators(value.trim().replace(/^"+|"+$/g, ''));
					if (!cleaned) {
						return undefined;
					}
					if (!/^[a-zA-Z]:[\\/]/.test(cleaned)) {
						return undefined;
					}
					return cleaned;
				}

				function normalizeStoredFolderUri(uri) {
					const raw = toRawPath(uri);
					return raw ? toFolderUri(raw) : undefined;
				}

				function getDesktopPath() {
					try {
						const processApi = window.process || (window.parent && window.parent.process);
						const env = processApi && processApi.env ? processApi.env : undefined;
						const userProfile = env && env.USERPROFILE ? env.USERPROFILE : undefined;
						if (typeof userProfile === 'string' && userProfile.trim()) {
							return `${trimRightSeparators(userProfile)}\\Desktop`;
						}
					}
					catch (error) {
						console.warn('[yhb-eda-tools] get desktop path failed', error);
					}
					return undefined;
				}

				async function setConfig(key, value) {
					try {
						await edaApi.sys_Storage.setExtensionUserConfig(key, value);
					}
					catch (error) {
						console.warn('[yhb-eda-tools] set config failed', key, error);
					}
				}

				function getConfig(key) {
					try {
						return edaApi.sys_Storage.getExtensionUserConfig(key);
					}
					catch (error) {
						console.warn('[yhb-eda-tools] get config failed', key, error);
						return undefined;
					}
				}

				async function fillTemplates(preferredTemplate) {
					templateSelect.innerHTML = '';
					try {
						const templates = await edaApi.pcb_ManufactureData.getBomTemplates();
						if (!Array.isArray(templates) || templates.length === 0) {
							const option = document.createElement('option');
							option.value = '';
							option.textContent = '未找到已导入模板';
							templateSelect.appendChild(option);
							setStatus('未获取到 BOM 模板，请先在 EDA 中导入模板。', 'error');
							exportBtn.disabled = true;
							return;
						}

						templates.forEach((template) => {
							const option = document.createElement('option');
							option.value = template;
							option.textContent = template;
							templateSelect.appendChild(option);
						});

						if (preferredTemplate && templates.includes(preferredTemplate)) {
							templateSelect.value = preferredTemplate;
						}
						else {
							templateSelect.value = templates[0];
						}

						setStatus(`模板加载完成，共 ${templates.length} 个。`, 'success');
					}
					catch (error) {
						console.error('[yhb-eda-tools] get templates failed', error);
						const option = document.createElement('option');
						option.value = '';
						option.textContent = '加载失败';
						templateSelect.appendChild(option);
						setStatus('加载模板失败，请检查权限或稍后重试。', 'error');
						exportBtn.disabled = true;
					}
				}

				function withExt(fileName, extWithoutDot) {
					if (new RegExp(`\\.${extWithoutDot}$`, 'i').test(fileName)) {
						return fileName;
					}
					return `${fileName}.${extWithoutDot}`;
				}

				function normalizeExportName(file, fallbackBase, defaultExt) {
					// Force a deterministic export name pattern instead of using API-returned names.
					return withExt(fallbackBase, defaultExt);
				}

				function formatDatePart(date, separator) {
					const year = date.getFullYear();
					const month = `${date.getMonth() + 1}`.padStart(2, '0');
					const day = `${date.getDate()}`.padStart(2, '0');
					return [year, month, day].join(separator);
				}

				function normalizeBoardName(rawName) {
					const safe = String(rawName || '')
						.trim()
						.replace(/\s+/g, '-')
						.replace(/[<>:"/\\|?*\u0000-\u001f]/g, '_');
					return safe || 'PCB';
				}

				function resolveConfiguredOutputPath() {
					const inputPath = outputDirInput && outputDirInput.value ? outputDirInput.value : '';
					const normalizedInputPath = normalizeDirectoryInput(inputPath);
					if (inputPath.trim() && !normalizedInputPath) {
						throw new Error('保存路径格式无效，请输入 Windows 绝对路径（如 C:\\Export）。');
					}
					return normalizedInputPath;
				}

				function sleep(ms) {
					return new Promise((resolve) => setTimeout(resolve, ms));
				}

				function getErrorMessage(error) {
					if (error && error.message) {
						return error.message;
					}
					if (typeof error === 'string' && error.trim()) {
						return error;
					}
					const converted = String(error);
					return converted && converted !== 'undefined' ? converted : 'unknown';
				}

				function createExportError(type, message) {
					const error = new Error(message);
					error.exportType = type;
					return error;
				}

				function isFetchFailure(error) {
					return /failed to fetch/i.test(getErrorMessage(error));
				}

				function classifyExportError(error) {
					const type = error && error.exportType ? error.exportType : '';
					const message = getErrorMessage(error);
					if (type === 'context') {
						return 'PCB上下文失效';
					}
					if (type === 'empty-file') {
						return '接口返回空文件';
					}
					if (type === 'save-failed') {
						return '本地保存失败';
					}
					if (type === 'filesystem-unavailable') {
						return '文件系统接口不可用';
					}
					if (type === 'user-cancel') {
						return '用户取消';
					}
					if (type === 'api-fetch') {
						return '制造接口调用失败';
					}
					if (isFetchFailure(error)) {
						return '制造接口调用失败';
					}
					if (/未获取到目标目录|选择目录/.test(message)) {
						return '目录选择失败';
					}
					return '未知错误';
				}

				function joinWindowsPath(folderPath, fileName) {
					const folder = trimRightSeparators(folderPath);
					return `${folder}\\${fileName}`;
				}

				function toForwardSlashPath(path) {
					return String(path || '').replace(/\\/g, '/');
				}

				async function ensurePcbContext(stage) {
					const docInfo = await edaApi.dmt_SelectControl.getCurrentDocumentInfo();
					if (!docInfo || docInfo.documentType !== PCB_DOCUMENT_TYPE) {
						throw createExportError('context', `PCB 上下文失效（${stage}），请切回 PCB 页面后重试。`);
					}
					return docInfo;
				}

				async function getEnvironmentStatusText() {
					if (!edaApi.sys_Environment) {
						return '环境状态: 无法检测（接口不可用）';
					}
					try {
						const isOnline = typeof edaApi.sys_Environment.isOnlineMode === 'function'
							? edaApi.sys_Environment.isOnlineMode()
							: undefined;
						const isOffline = typeof edaApi.sys_Environment.isOfflineMode === 'function'
							? edaApi.sys_Environment.isOfflineMode()
							: undefined;
						const isHalfOffline = typeof edaApi.sys_Environment.isHalfOfflineMode === 'function'
							? edaApi.sys_Environment.isHalfOfflineMode()
							: undefined;
						const version = typeof edaApi.sys_Environment.getEditorCurrentVersion === 'function'
							? edaApi.sys_Environment.getEditorCurrentVersion()
							: 'unknown';
						return `环境状态: online=${String(isOnline)}, offline=${String(isOffline)}, halfOffline=${String(isHalfOffline)}, version=${version}`;
					}
					catch (error) {
						console.warn('[yhb-eda-tools] get environment status failed', error);
						return `环境状态: 检测失败（${getErrorMessage(error)}）`;
					}
				}

				async function generateManufactureFileWithRetry(label, getFile, retryTimes) {
					const maxRetry = typeof retryTimes === 'number' && retryTimes >= 0 ? retryTimes : 0;
					const startedAt = Date.now();
					let lastError;

					for (let attempt = 0; attempt <= maxRetry; attempt += 1) {
						try {
							await ensurePcbContext(`${label}生成前`);
							const file = await getFile();
							await ensurePcbContext(`${label}生成后`);
							if (!file) {
								throw createExportError('empty-file', `${label} 接口未返回文件。`);
							}
							return {
								file,
								retryCount: attempt,
								generateDurationMs: Date.now() - startedAt,
							};
						}
						catch (error) {
							lastError = error;
							if (isFetchFailure(error) && attempt >= maxRetry) {
								throw createExportError('api-fetch', `${label} 导出接口调用失败（${getErrorMessage(error)}）`);
							}
							if (!isFetchFailure(error) || attempt >= maxRetry) {
								throw error;
							}
							await sleep(250 * (attempt + 1));
						}
					}

					throw lastError || createExportError('unknown', `${label} 生成失败。`);
				}

				async function saveToTargetFolder(targetFolderUri, targetFolderRawPath, file, fileName, label) {
					const saveStartedAt = Date.now();
					const fullPathBackslash = joinWindowsPath(targetFolderRawPath, fileName);
					const fullPathSlash = toForwardSlashPath(fullPathBackslash);
					const candidateUris = [
						fullPathBackslash,
						fullPathSlash,
						targetFolderUri,
					];
					let lastError;
					for (let i = 0; i < candidateUris.length; i += 1) {
						const uri = candidateUris[i];
						try {
							// Full-path mode is usually more reliable in some EasyEDA client builds.
							const ok = i < 2
								? await edaApi.sys_FileSystem.saveFileToFileSystem(uri, file, undefined, true)
								: await edaApi.sys_FileSystem.saveFileToFileSystem(uri, file, fileName, true);
							if (ok) {
								return {
									saveDurationMs: Date.now() - saveStartedAt,
								};
							}
							lastError = createExportError('save-failed', `${label} 保存失败（返回 false）。uri=${uri}`);
						}
						catch (error) {
							lastError = error;
						}
					}
					const lastMsg = getErrorMessage(lastError);
					if (isFetchFailure(lastError)) {
						throw createExportError(
							'filesystem-unavailable',
							`${label} 批量保存不可用（${lastMsg}）。请检查扩展外部交互权限、目录可写性，或改用“逐个另存为”。`,
						);
					}
					throw lastError || createExportError('save-failed', `${label} 保存失败。`);
				}

				async function saveWithSystemDialog(file, fileName) {
					const saveStartedAt = Date.now();
					await edaApi.sys_FileSystem.saveFile(file, fileName);
					return {
						saveDurationMs: Date.now() - saveStartedAt,
					};
				}

				async function checkDrcBeforeGerber() {
					if (!edaApi.pcb_Drc || typeof edaApi.pcb_Drc.check !== 'function') {
						appendResult('⚠️ DRC接口不可用，已跳过Gerber前DRC检测。');
						return;
					}

					appendResult('Gerber前置检查: 正在执行DRC检测...');
					let drcPassed;
					try {
						// Returns true when DRC passes; false means rule issues detected.
						drcPassed = await edaApi.pcb_Drc.check(true, true, false);
					}
					catch (error) {
						appendResult(`⚠️ DRC检测执行失败，默认继续导出Gerber: ${getErrorMessage(error)}`);
						return;
					}

					if (drcPassed === true) {
						appendResult('✅ DRC检测通过，继续导出Gerber。');
						return;
					}

					const message = '检测到DRC问题，是否继续导出Gerber？';
					let confirmed = true;
					try {
						if (edaApi.sys_Dialog && typeof edaApi.sys_Dialog.showConfirmationMessage === 'function') {
							confirmed = await edaApi.sys_Dialog.showConfirmationMessage(message, 'DRC检测');
						}
						else {
							confirmed = window.confirm(message);
						}
					}
					catch (error) {
						appendResult(`⚠️ DRC确认弹窗调用失败，默认继续导出Gerber: ${getErrorMessage(error)}`);
						confirmed = true;
					}

					if (!confirmed) {
						throw createExportError('user-cancel', '用户取消：检测到DRC问题后未继续导出Gerber。');
					}

					appendResult('⚠️ 检测到DRC问题，用户选择继续导出Gerber。');
				}

				async function exportAll() {
					clearResult();
					setStatus('', '');
					exportBtn.disabled = true;

					const selectedTemplate = templateSelect.value ? templateSelect.value.trim() : '';
					if (!selectedTemplate) {
						setStatus('请先选择 BOM 模板。', 'error');
						exportBtn.disabled = false;
						return;
					}
					await setConfig(STORAGE_TEMPLATE_KEY, selectedTemplate);

					const progress = edaApi.sys_LoadingAndProgressBar;
					progress.showProgressBar(1, '导出PCB资料');
					appendResult('开始导出...');

					try {
						await ensurePcbContext('预检');
						appendResult(await getEnvironmentStatusText());

						const pcbInfo = await edaApi.dmt_Pcb.getCurrentPcbInfo();
						if (!pcbInfo || !pcbInfo.name) {
							throw new Error('未获取到当前 PCB 信息。');
						}

						const boardName = normalizeBoardName(pcbInfo.name);
						const now = new Date();
						const dateHyphen = formatDatePart(now, '-');
						const dateUnderline = formatDatePart(now, '_');
						appendResult(`BOM模板: ${selectedTemplate}`);
						progress.showProgressBar(12, '正在生成 BOM');

						const bomJob = {
							label: 'BOM',
							defaultExt: 'xlsx',
							saveName: `BOM_Board1_${boardName}_${dateHyphen}`,
							getFile: () => edaApi.pcb_ManufactureData.getBomFile('bom_export', 'xlsx', selectedTemplate),
						};
						const bomResult = await generateManufactureFileWithRetry(bomJob.label, bomJob.getFile, 2);
						appendResult(`BOM生成完成: 重试 ${bomResult.retryCount} 次, 耗时 ${bomResult.generateDurationMs}ms`);

						const configuredPath = resolveConfiguredOutputPath();
						const targetFolderUri = configuredPath ? toFolderUri(configuredPath) : undefined;
						let useBatchMode = Boolean(configuredPath);
						if (configuredPath) {
							progress.showProgressBar(28, '按保存路径导出 BOM');
							appendResult(`保存目录: ${targetFolderUri}`);
							appendResult('导出模式: 批量导出（按保存路径）');
						}
						else {
							progress.showProgressBar(28, '按系统另存为保存 BOM');
							appendResult('导出模式: 系统另存为（未填写保存路径）');
							appendResult('提示: 未填写保存路径时，每个文件都会弹出一次另存为窗口。');
						}

						const bomFileName = normalizeExportName(bomResult.file, bomJob.saveName, bomJob.defaultExt);
						let bomSaveResult;
						if (useBatchMode) {
							try {
								bomSaveResult = await saveToTargetFolder(targetFolderUri, configuredPath, bomResult.file, bomFileName, bomJob.label);
							}
							catch (error) {
								if (error && error.exportType === 'filesystem-unavailable') {
									appendResult(`⚠️ 批量保存不可用，自动切换为系统另存为: ${getErrorMessage(error)}`);
									useBatchMode = false;
									bomSaveResult = await saveWithSystemDialog(bomResult.file, bomFileName);
								}
								else {
									throw error;
								}
							}
						}
						else {
							bomSaveResult = await saveWithSystemDialog(bomResult.file, bomFileName);
						}
						appendResult(`✅ BOM: ${bomFileName} | 生成耗时 ${bomResult.generateDurationMs}ms | 保存耗时 ${bomSaveResult.saveDurationMs}ms | 重试 ${bomResult.retryCount} 次`);

						if (useBatchMode) {
							await setConfig(STORAGE_OUTPUT_DIR_KEY, targetFolderUri);
							await setConfig(STORAGE_OUTPUT_DIR_RAW_KEY, configuredPath);
							setStatus('路径有效，正在批量导出其余文件...', 'success');
						}
						else {
							setStatus('未填写保存路径，将按系统另存为逐个保存。', '');
						}

						const otherJobs = [
							{
								label: 'Gerber',
								defaultExt: 'zip',
								saveName: `Gerber_${boardName}_${dateHyphen}`,
								getFile: () => edaApi.pcb_ManufactureData.getGerberFile('gerber_export'),
							},
							{
								label: '坐标文件',
								defaultExt: 'xlsx',
								saveName: `PickAndPlace_${boardName}_${dateUnderline}`,
								getFile: () => edaApi.pcb_ManufactureData.getPickAndPlaceFile('pick_and_place_export', 'xlsx'),
							},
							{
								label: 'DXF',
								defaultExt: 'dxf',
								saveName: `DXF_${boardName}_${dateHyphen}_AutoCAD2007`,
								getFile: () => edaApi.pcb_ManufactureData.getDxfFile('dxf_export'),
							},
							{
								label: '3D',
								defaultExt: 'step',
								saveName: `3D_${boardName}_${dateHyphen}`,
								getFile: () => edaApi.pcb_ManufactureData.get3DFile('step_export', 'step'),
							},
						];

						let failCount = 0;

						for (let i = 0; i < otherJobs.length; i += 1) {
							const job = otherJobs[i];
							const ratio = Math.round(35 + ((i + 1) / otherJobs.length) * 55);
							progress.showProgressBar(ratio, `导出中: ${job.label}`);
							try {
								if (job.label === 'Gerber') {
									await checkDrcBeforeGerber();
								}
								const generated = await generateManufactureFileWithRetry(job.label, job.getFile, 2);
								const fileName = normalizeExportName(generated.file, job.saveName, job.defaultExt);
								const saved = useBatchMode
									? await saveToTargetFolder(targetFolderUri, configuredPath, generated.file, fileName, job.label)
									: await saveWithSystemDialog(generated.file, fileName);
								appendResult(`✅ ${job.label}: ${fileName} | 生成耗时 ${generated.generateDurationMs}ms | 保存耗时 ${saved.saveDurationMs}ms | 重试 ${generated.retryCount} 次`);
							}
							catch (error) {
								failCount += 1;
								const reason = getErrorMessage(error);
								const category = classifyExportError(error);
								appendResult(`❌ ${job.label}: [${category}] ${reason}`);
								console.error(`[yhb-eda-tools] export ${job.label} failed`, error);
							}
						}

						progress.showProgressBar(100, '导出完成');
						if (failCount === 0) {
							setStatus('全部导出成功。', 'success');
						}
						else {
							setStatus(`导出完成，${failCount} 项失败，请查看结果明细。`, 'error');
						}
					}
					catch (error) {
						const reason = getErrorMessage(error);
						console.error('[yhb-eda-tools] export process failed', error);
						if (reason === '已取消选择目录。') {
							setStatus(reason, '');
							appendResult(`❌ 终止: [${classifyExportError(createExportError('user-cancel', reason))}] ${reason}`);
						}
						else {
							setStatus(reason, 'error');
							appendResult(`❌ 终止: [${classifyExportError(error)}] ${reason}`);
						}
					}
					finally {
						progress.destroyProgressBar();
						exportBtn.disabled = false;
					}
				}

				async function bootstrap() {
					if (!edaApi) {
						setStatus('未检测到 EDA API，请在 EDA 客户端内打开此页面。', 'error');
						exportBtn.disabled = true;
						return;
					}

					const lastTemplate = getConfig(STORAGE_TEMPLATE_KEY);
					await fillTemplates(typeof lastTemplate === 'string' ? lastTemplate : undefined);
					const storedRawPath = toRawPath(getConfig(STORAGE_OUTPUT_DIR_RAW_KEY)) || toRawPath(getConfig(STORAGE_OUTPUT_DIR_KEY));
					if (outputDirInput && storedRawPath) {
						outputDirInput.value = storedRawPath;
					}
					exportBtn.disabled = false;
				}

				refreshTemplatesBtn.addEventListener('click', async () => {
					const current = templateSelect.value || getConfig(STORAGE_TEMPLATE_KEY);
					await fillTemplates(current);
				});

				saveTemplateBtn.addEventListener('click', async () => {
					const value = templateSelect.value ? templateSelect.value.trim() : '';
					if (!value) {
						setStatus('当前没有可保存的模板。', 'error');
						return;
					}
					await setConfig(STORAGE_TEMPLATE_KEY, value);
					setStatus('模板记忆已保存。', 'success');
				});

				templateSelect.addEventListener('change', async () => {
					const value = templateSelect.value ? templateSelect.value.trim() : '';
					if (value) {
						await setConfig(STORAGE_TEMPLATE_KEY, value);
					}
				});

				outputDirInput.addEventListener('blur', async () => {
					const path = outputDirInput.value ? outputDirInput.value.trim() : '';
					if (!path) {
						return;
					}
					const normalized = normalizeDirectoryInput(path);
					if (!normalized) {
						setStatus('保存路径格式无效，请输入 Windows 绝对路径（如 C:\\Export）。', 'error');
						return;
					}
					await setConfig(STORAGE_OUTPUT_DIR_RAW_KEY, normalized);
					await setConfig(STORAGE_OUTPUT_DIR_KEY, toFolderUri(normalized));
				});

				exportBtn.addEventListener('click', exportAll);
				bootstrap();
			})();
		</script>
	</body>
</html>
