<!doctype html>
<html lang="zh-Hans">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>导出PCB资料</title>
		<style>
			:root {
				--bg: #f5f7fb;
				--panel: #ffffff;
				--text: #12263a;
				--sub: #5e6b7a;
				--line: #d7deea;
				--primary: #0066d9;
				--primary-hover: #0056b7;
				--ok: #137333;
				--err: #b3261e;
			}

			* {
				box-sizing: border-box;
				font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
			}

			body {
				margin: 0;
				padding: 20px;
				background: radial-gradient(circle at top right, #e7f0ff 0%, var(--bg) 45%);
				color: var(--text);
			}

			.panel {
				background: var(--panel);
				border: 1px solid var(--line);
				border-radius: 12px;
				padding: 16px;
				box-shadow: 0 8px 24px rgba(16, 35, 58, 0.06);
			}

			h1 {
				margin: 0 0 8px;
				font-size: 20px;
			}

			.desc {
				margin: 0 0 16px;
				color: var(--sub);
				font-size: 13px;
			}

			.grid {
				display: grid;
				grid-template-columns: 1fr;
				gap: 14px;
			}

			label {
				display: block;
				font-size: 13px;
				margin-bottom: 6px;
				color: var(--sub);
			}

			select {
				width: 100%;
				padding: 10px 12px;
				border: 1px solid var(--line);
				border-radius: 8px;
				font-size: 14px;
				background: #fff;
			}

			.row {
				display: grid;
				grid-template-columns: 1fr auto auto;
				gap: 8px;
			}

			button {
				border: 1px solid var(--line);
				background: #fff;
				color: var(--text);
				border-radius: 8px;
				padding: 10px 14px;
				font-size: 13px;
				cursor: pointer;
			}

			button.primary {
				background: var(--primary);
				border-color: var(--primary);
				color: #fff;
				font-weight: 600;
			}

			button.primary:hover {
				background: var(--primary-hover);
			}

			button:disabled {
				cursor: not-allowed;
				opacity: 0.55;
			}

			.footer {
				display: flex;
				gap: 10px;
				margin-top: 14px;
				align-items: center;
				flex-wrap: wrap;
			}

			.message {
				font-size: 13px;
				color: var(--sub);
				margin-top: 10px;
				white-space: pre-wrap;
			}

			.message.error {
				color: var(--err);
			}

			.message.success {
				color: var(--ok);
			}

			.result {
				margin-top: 14px;
				border-top: 1px dashed var(--line);
				padding-top: 12px;
				font-size: 13px;
				white-space: pre-wrap;
			}

			@media (max-width: 740px) {
				.row {
					grid-template-columns: 1fr;
				}
			}
		</style>
	</head>
	<body>
		<div class="panel">
			<h1>导出PCB资料</h1>
			<p class="desc">仅保留模板选择。点击一键导出后，直接弹出系统目录选择窗口。</p>

			<div class="grid">
				<div>
					<label for="templateSelect">BOM模板（已导入模板）</label>
					<div class="row">
						<select id="templateSelect"></select>
						<button id="refreshTemplatesBtn" type="button">刷新模板</button>
						<button id="saveTemplateBtn" type="button">保存模板记忆</button>
					</div>
				</div>
			</div>

			<div class="footer">
				<button id="exportBtn" class="primary" type="button">一键导出</button>
				<span id="statusMessage" class="message"></span>
			</div>

			<div id="result" class="result"></div>
			<input id="nativeFolderPicker" type="file" webkitdirectory directory multiple style="display:none" />
		</div>

		<script>
			(() => {
				const STORAGE_TEMPLATE_KEY = 'export_pcb.default_template';
				const PCB_DOCUMENT_TYPE = 3;

				const templateSelect = document.getElementById('templateSelect');
				const refreshTemplatesBtn = document.getElementById('refreshTemplatesBtn');
				const saveTemplateBtn = document.getElementById('saveTemplateBtn');
				const exportBtn = document.getElementById('exportBtn');
				const statusMessage = document.getElementById('statusMessage');
				const resultBox = document.getElementById('result');
				const nativeFolderPicker = document.getElementById('nativeFolderPicker');

				function getEdaApi() {
					if (window.eda) {
						return window.eda;
					}
					if (window.parent && window.parent.eda) {
						return window.parent.eda;
					}
					return undefined;
				}

				const edaApi = getEdaApi();

				function setStatus(message, mode) {
					statusMessage.textContent = message || '';
					statusMessage.className = mode ? `message ${mode}` : 'message';
				}

				function clearResult() {
					resultBox.textContent = '';
				}

				function appendResult(line) {
					resultBox.textContent += `${line}\n`;
				}

				function trimRightSeparators(path) {
					return path.replace(/[\\/]+$/, '');
				}

				function toFolderUri(path) {
					const trimmed = trimRightSeparators(path);
					const sep = /\\/.test(trimmed) ? '\\' : '/';
					return `${trimmed}${sep}`;
				}

				function extractDirectoryFromFile(fileLike) {
					if (!fileLike || typeof fileLike.path !== 'string' || !fileLike.path) {
						return undefined;
					}
					return fileLike.path.replace(/[\\/][^\\/]*$/, '');
				}

				function extractDirectoryFromNativeFolderSelection(fileLike) {
					if (!fileLike || typeof fileLike.path !== 'string' || !fileLike.path) {
						return undefined;
					}

					const absolutePath = fileLike.path;
					const relativePath = typeof fileLike.webkitRelativePath === 'string' ? fileLike.webkitRelativePath : '';
					if (!relativePath) {
						return extractDirectoryFromFile(fileLike);
					}

					const relWin = relativePath.replace(/\//g, '\\');
					const absLower = absolutePath.toLowerCase();
					const relLower = relWin.toLowerCase();
					if (absLower.endsWith(relLower)) {
						return absolutePath.slice(0, absolutePath.length - relWin.length).replace(/[\\/]+$/, '');
					}

					return extractDirectoryFromFile(fileLike);
				}

				async function setConfig(key, value) {
					try {
						await edaApi.sys_Storage.setExtensionUserConfig(key, value);
					}
					catch (error) {
						console.warn('[yhb-eda-tools] set config failed', key, error);
					}
				}

				function getConfig(key) {
					try {
						return edaApi.sys_Storage.getExtensionUserConfig(key);
					}
					catch (error) {
						console.warn('[yhb-eda-tools] get config failed', key, error);
						return undefined;
					}
				}

				async function fillTemplates(preferredTemplate) {
					templateSelect.innerHTML = '';
					try {
						const templates = await edaApi.pcb_ManufactureData.getBomTemplates();
						if (!Array.isArray(templates) || templates.length === 0) {
							const option = document.createElement('option');
							option.value = '';
							option.textContent = '未找到已导入模板';
							templateSelect.appendChild(option);
							setStatus('未获取到 BOM 模板，请先在 EDA 中导入模板。', 'error');
							exportBtn.disabled = true;
							return;
						}

						templates.forEach((template) => {
							const option = document.createElement('option');
							option.value = template;
							option.textContent = template;
							templateSelect.appendChild(option);
						});

						if (preferredTemplate && templates.includes(preferredTemplate)) {
							templateSelect.value = preferredTemplate;
						}
						else {
							templateSelect.value = templates[0];
						}

						setStatus(`模板加载完成，共 ${templates.length} 个。`, 'success');
					}
					catch (error) {
						console.error('[yhb-eda-tools] get templates failed', error);
						const option = document.createElement('option');
						option.value = '';
						option.textContent = '加载失败';
						templateSelect.appendChild(option);
						setStatus('加载模板失败，请检查权限或稍后重试。', 'error');
						exportBtn.disabled = true;
					}
				}

				function withExt(fileName, extWithoutDot) {
					if (new RegExp(`\\.${extWithoutDot}$`, 'i').test(fileName)) {
						return fileName;
					}
					return `${fileName}.${extWithoutDot}`;
				}

				function normalizeExportName(file, fallbackBase, defaultExt) {
					const raw = file && file.name ? file.name : fallbackBase;
					return withExt(raw, defaultExt);
				}

				async function pickOutputDirBySelectingFile() {
					const selected = await edaApi.sys_FileSystem.openReadFileDialog(undefined, false);
					const dir = extractDirectoryFromFile(selected);
					if (!dir) {
						throw new Error('未获取到目标目录，请在目标目录内任选一个文件。');
					}
					return toFolderUri(dir);
				}

				function pickOutputDir() {
					return new Promise((resolve, reject) => {
						const onChange = () => {
							nativeFolderPicker.removeEventListener('change', onChange);
							const files = nativeFolderPicker.files;
							if (!files || files.length === 0) {
								reject(new Error('未选择目录。'));
								return;
							}
							const dir = extractDirectoryFromNativeFolderSelection(files[0]);
							if (dir) {
								resolve(toFolderUri(dir));
								return;
							}

							// In some EasyEDA runtimes, folder picker returns files without absolute path.
							// Fallback: ask user to pick any file inside target folder, then infer its directory.
							pickOutputDirBySelectingFile()
								.then(resolve)
								.catch((fallbackError) => {
									reject(new Error(fallbackError && fallbackError.message ? fallbackError.message : '未获取到目标目录，请重试。'));
								});
						};

						nativeFolderPicker.value = '';
						nativeFolderPicker.addEventListener('change', onChange, { once: true });
						nativeFolderPicker.click();
					});
				}

				async function exportAll() {
					clearResult();
					setStatus('', '');
					exportBtn.disabled = true;

					const selectedTemplate = templateSelect.value ? templateSelect.value.trim() : '';
					if (!selectedTemplate) {
						setStatus('请先选择 BOM 模板。', 'error');
						exportBtn.disabled = false;
						return;
					}
					await setConfig(STORAGE_TEMPLATE_KEY, selectedTemplate);

					const progress = edaApi.sys_LoadingAndProgressBar;
					progress.showProgressBar(1, '导出PCB资料');
					appendResult('开始导出...');

					try {
						const docInfo = await edaApi.dmt_SelectControl.getCurrentDocumentInfo();
						if (!docInfo || docInfo.documentType !== PCB_DOCUMENT_TYPE) {
							throw new Error('请先激活 PCB 页面后再导出。');
						}

						const pcbInfo = await edaApi.dmt_Pcb.getCurrentPcbInfo();
						if (!pcbInfo || !pcbInfo.name) {
							throw new Error('未获取到当前 PCB 信息。');
						}

						setStatus('请选择目标目录。若失败将自动改为“选择该目录内任意文件”。', '');
						const targetFolderUri = await pickOutputDir();
						appendResult(`保存目录: ${targetFolderUri}`);
						appendResult(`BOM模板: ${selectedTemplate}`);

						const boardName = pcbInfo.name.replace(/[<>:"/\\|?*\u0000-\u001f]/g, '_').trim() || 'PCB';
						const jobs = [
							{
								label: 'Gerber',
								defaultExt: 'zip',
								saveName: `${boardName}_Gerber`,
								getFile: () => edaApi.pcb_ManufactureData.getGerberFile('gerber_export'),
							},
							{
								label: '坐标文件',
								defaultExt: 'xlsx',
								saveName: `${boardName}_PickAndPlace`,
								getFile: () => edaApi.pcb_ManufactureData.getPickAndPlaceFile('pick_and_place_export', 'xlsx'),
							},
							{
								label: 'BOM',
								defaultExt: 'xlsx',
								saveName: `${boardName}_BOM`,
								getFile: () => edaApi.pcb_ManufactureData.getBomFile('bom_export', 'xlsx', selectedTemplate),
							},
							{
								label: 'DXF',
								defaultExt: 'dxf',
								saveName: `${boardName}_DXF`,
								getFile: () => edaApi.pcb_ManufactureData.getDxfFile('dxf_export'),
							},
							{
								label: '3D',
								defaultExt: 'step',
								saveName: `${boardName}_3D`,
								getFile: () => edaApi.pcb_ManufactureData.get3DFile('step_export', 'step'),
							},
						];

						let failCount = 0;

						for (let i = 0; i < jobs.length; i += 1) {
							const job = jobs[i];
							const ratio = Math.round(((i + 1) / (jobs.length + 1)) * 100);
							progress.showProgressBar(ratio, `导出中: ${job.label}`);
							try {
								const file = await job.getFile();
								if (!file) {
									throw new Error('接口未返回文件。');
								}

								const fileName = normalizeExportName(file, job.saveName, job.defaultExt);
								const ok = await edaApi.sys_FileSystem.saveFileToFileSystem(targetFolderUri, file, fileName, true);
								if (!ok) {
									throw new Error('文件保存失败（返回 false）');
								}
								appendResult(`✅ ${job.label}: ${fileName}`);
							}
							catch (error) {
								failCount += 1;
								const reason = error && error.message ? error.message : String(error);
								appendResult(`❌ ${job.label}: ${reason}`);
								console.error(`[yhb-eda-tools] export ${job.label} failed`, error);
							}
						}

						progress.showProgressBar(100, '导出完成');
						if (failCount === 0) {
							setStatus('全部导出成功。', 'success');
						}
						else {
							setStatus(`导出完成，${failCount} 项失败，请查看结果明细。`, 'error');
						}
					}
					catch (error) {
						const reason = error && error.message ? error.message : String(error);
						console.error('[yhb-eda-tools] export process failed', error);
						setStatus(reason, 'error');
						appendResult(`❌ 终止: ${reason}`);
					}
					finally {
						progress.destroyProgressBar();
						exportBtn.disabled = false;
					}
				}

				async function bootstrap() {
					if (!edaApi) {
						setStatus('未检测到 EDA API，请在 EDA 客户端内打开此页面。', 'error');
						exportBtn.disabled = true;
						return;
					}

					const lastTemplate = getConfig(STORAGE_TEMPLATE_KEY);
					await fillTemplates(typeof lastTemplate === 'string' ? lastTemplate : undefined);
					exportBtn.disabled = false;
				}

				refreshTemplatesBtn.addEventListener('click', async () => {
					const current = templateSelect.value || getConfig(STORAGE_TEMPLATE_KEY);
					await fillTemplates(current);
				});

				saveTemplateBtn.addEventListener('click', async () => {
					const value = templateSelect.value ? templateSelect.value.trim() : '';
					if (!value) {
						setStatus('当前没有可保存的模板。', 'error');
						return;
					}
					await setConfig(STORAGE_TEMPLATE_KEY, value);
					setStatus('模板记忆已保存。', 'success');
				});

				templateSelect.addEventListener('change', async () => {
					const value = templateSelect.value ? templateSelect.value.trim() : '';
					if (value) {
						await setConfig(STORAGE_TEMPLATE_KEY, value);
					}
				});

				exportBtn.addEventListener('click', exportAll);
				bootstrap();
			})();
		</script>
	</body>
</html>
